spring.datasource.url=jdbc:h2:mem:arq_software
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

spring.sql.init.mode=always

#aws.sqs.queue.saida-estoque=SQS-SAIDA-ESTOQUE.fifo
#aws.sqs.queue.entrada-estoque=SQS-ENTRADA-ESTOQUE.fifo

# Credenciais AWS
cloud.aws.credentials.access-key=${AWS_ACCESS_KEY_ID}
cloud.aws.credentials.secret-key=${AWS_SECRET_ACCESS_KEY}
spring.cloud.aws.region.static=us-east-1

# Nome da sua fila (Criada na Fase 2)
queue.order-events=T02N_FELIPE_HERINGER.fifo